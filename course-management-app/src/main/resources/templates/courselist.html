<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Management</title>

    <style>
        body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-top: 6px solid #3b82f6;
        }

        h3 {
            text-align: center;
            color: #1e3a8a;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #2563eb;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #eef5ff;
        }

        .row-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-update {
            background: #16a34a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h3>Course Management</h3>

    <a th:href="@{/showCourseForm}" class="btn">Add New Course</a>

    <table>

        <thead>
        <tr>
            <th>Course Name</th>
            <th>Trainer</th>
            <th>Duration</th>
            <th>Fees</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="course : ${courses}">

            <td th:text="${course.courseName}"></td>
            <td th:text="${course.trainerName}"></td>
            <td th:text="${course.duration}"></td>
            <td th:text="${course.fees}"></td>

            <td>
                <div class="row-actions">

                    <form th:action="@{/updateCourseForm}" method="GET">
                        <input type="hidden" name="id" th:value="${course.id}" />
                        <button type="submit" class="btn-update">
                            Update
                        </button>
                    </form>

                    <form th:action="@{/deleteCourse}" method="GET">
                        <input type="hidden" name="id" th:value="${course.id}" />
                        <button type="submit"
                                class="btn-delete"
                                onclick="return confirm('Are you sure you want to delete this course?')">
                            Delete
                        </button>
                    </form>

                </div>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
