<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add / Update Course</title>

    <style>
        body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 70px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-top: 6px solid #3b82f6;
        }

        h3 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #c7d2fe;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
        }

        .btn-submit {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
        }

        .btn-cancel {
            background: #64748b;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h3>Course Details</h3>

    <form th:action="@{/registerCourse}" th:object="${course}" method="POST">

        <input type="hidden" th:field="*{id}" />

        <label>Course Name</label>
        <input type="text" th:field="*{courseName}" placeholder="Enter course name" required />

        <label>Trainer Name</label>
        <input type="text" th:field="*{trainerName}" placeholder="Enter trainer name" required />

        <label>Duration (Hours)</label>
        <input type="number" th:field="*{duration}" placeholder="Enter duration" required />

        <label>Fees</label>
        <input type="number" step="0.01" th:field="*{fees}" placeholder="Enter fees" required />

        <div class="btn-group">
            <button type="submit" class="btn-submit">Save Course</button>
            <a th:href="@{/courselist}" class="btn-cancel">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
